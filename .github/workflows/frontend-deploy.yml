name: Frontend Build and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-2
  FRONTEND_REPOSITORY: lab-commit-frontend
  VALUES_FILE: helm/lab-commit/values.yaml

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: v1.0.${{ github.run_number }}
        run: |
          set -euo pipefail
          docker build -t "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}" frontend
          docker push "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Bump frontend image tag in Helm values
        env:
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, pathlib
          path = pathlib.Path(os.environ["VALUES_FILE"])
          tag = os.environ["IMAGE_TAG"]
          text = path.read_text()
          pattern = re.compile(
              r"(frontend:\s*\n(?:.*\n)*?\s*image:\s*\n(?:.*\n)*?\s*tag:\s*)([^\n#]+)"
          )
          new_text, count = pattern.subn(lambda m: m.group(1) + tag, text, count=1)
          if count != 1:
              raise SystemExit("frontend.image.tag not found in values.yaml")
          app_pattern = re.compile(r"(app:\s*\n(?:.*\n)*?\s*version:\s*)([^\n#]+)")
          new_text, app_count = app_pattern.subn(lambda m: m.group(1) + tag, new_text, count=1)
          if app_count != 1:
              raise SystemExit("app.version not found in values.yaml")
          path.write_text(new_text)
          PY
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_FILE}"
          if git diff --cached --quiet; then
            echo "No values.yaml change to commit"
            exit 0
          fi
          git commit -m "chore(release): bump frontend image and app version to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
