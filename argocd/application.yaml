apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-commit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sash19-dev/aws-lab-11-commit.git
    targetRevision: main
    path: helm/lab-commit
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
