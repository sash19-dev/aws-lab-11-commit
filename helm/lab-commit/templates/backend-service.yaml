apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: {{ include "lab-commit.name" . }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.service.targetPort }}
