version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - set -euo pipefail
      - IMAGE_TAG="v1.0.${CODEBUILD_BUILD_NUMBER}"
      - echo "Using image tag ${IMAGE_TAG}"
      - curl -sSL "https://get.helm.sh/helm-v3.16.2-linux-amd64.tar.gz" -o /tmp/helm.tgz
      - tar -xzf /tmp/helm.tgz -C /tmp
      - mv /tmp/linux-amd64/helm /usr/local/bin/helm
      - K8S_VERSION="$(aws eks describe-cluster --name "${CLUSTER_NAME}" --region "${AWS_REGION}" --query 'cluster.version' --output text)"
      - curl -sSL "https://dl.k8s.io/release/v${K8S_VERSION}.0/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
      - chmod +x /usr/local/bin/kubectl
  pre_build:
    commands:
      - set -euo pipefail
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${BACKEND_REPO%/*}"
      - aws eks update-kubeconfig --name "${CLUSTER_NAME}" --region "${AWS_REGION}"
  build:
    commands:
      - set -euo pipefail
      - docker build -t "${BACKEND_REPO}:${IMAGE_TAG}" backend
      - docker push "${BACKEND_REPO}:${IMAGE_TAG}"
      - docker build -t "${FRONTEND_REPO}:${IMAGE_TAG}" frontend
      - docker push "${FRONTEND_REPO}:${IMAGE_TAG}"
      - helm upgrade --install lab-commit ./helm/lab-commit -n app --create-namespace --set backend.image.repository="${BACKEND_REPO}" --set backend.image.tag="${IMAGE_TAG}" --set frontend.image.repository="${FRONTEND_REPO}" --set frontend.image.tag="${IMAGE_TAG}"
artifacts:
  files:
    - '**/*'
